# .github/workflows/build-linux.yml
name: build-linux

on:
  push:
    tags:
      - 'B[0-9]*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-x86_64
            cc: gcc
            inc_path: ""
            lib_path: ""
          - target: linux-aarch64
            cc: aarch64-linux-gnu-gcc
            inc_path: "-I/usr/include/aarch64-linux-gnu"
            lib_path: "-L/usr/lib/aarch64-linux-gnu"
          - target: linux-armv7
            cc: arm-linux-gnueabihf-gcc
            inc_path: "-I/usr/include/arm-linux-gnueabihf"
            lib_path: "-L/usr/lib/arm-linux-gnueabihf"
    steps:
      - uses: actions/checkout@v4

      - name: setup multiarch and install cross compilers
        run: |
          sudo dpkg --add-architecture arm64
          sudo dpkg --add-architecture armhf
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: install curl libs
        run: |
          sudo apt-get install -y libcurl4-openssl-dev libcurl4-openssl-dev:arm64 libcurl4-openssl-dev:armhf

      - name: build
        run: |
          mkdir -p bin
          ${{ matrix.cc }} -Wall -Wextra -std=c11 -O2 -Iinclude \
            ${{ matrix.inc_path }} ${{ matrix.lib_path }} \
            source/main.c source/engine.c \
            -o bin/icrawl-${{ matrix.target }} \
            -lcurl

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icrawl-${{ matrix.target }}
          path: bin/icrawl-${{ matrix.target }}
